    /* ── Presets (same as index) ── */
    .spot-preset-1{background:radial-gradient(ellipse at 65% 25%,#2d1b4e 0%,#090912 55%),linear-gradient(175deg,#0a0818 0%,#1a0f30 55%,#060609 100%);}

    .spot-preset-5{background:radial-gradient(ellipse at 55% 50%,#2d1a0a 0%,#0d0905 55%),linear-gradient(175deg,#0a0503 0%,#1e1005 55%,#090502 100%);}

    /* ── Container / page-title / page-sub → ui.js 공통 스타일 사용 ── */

    /* ── Chip filter (same as index hero chips) ── */
    .chips-wrap{margin-bottom:22px;}
    .glass-chip{
      display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:50px;
      background:rgba(255,255,255,0.05);-webkit-backdrop-filter:blur(8px) saturate(135%) brightness(0.9);backdrop-filter:blur(8px) saturate(135%) brightness(0.9);
      border:1px solid rgba(255,255,255,0.09);cursor:pointer;
      color:rgba(255,255,255,0.70);
      transition:background .25s,border-color .25s,transform .15s;
    }
    .glass-chip:hover{background:rgba(255,255,255,0.10);border-color:rgba(255,255,255,0.15);}
    .glass-chip:active{transform:scale(.97);}
    .glass-chip.active{background:rgba(74,222,128,0.12);border-color:rgba(74,222,128,0.30);}
    .glass-chip.active span{color:rgba(134,239,172,0.95);}
    .glass-chip.active svg{color:rgba(134,239,172,0.95);}
    .glass-chip span{font-size:14px;font-weight:600;color:inherit;transition:color .22s;}
    .glass-chip svg{flex-shrink:0;color:inherit;}

    /* ── List items (pixel-exact match of index.html list section) ── */
    .list-divider{height:1px;background:rgba(255,255,255,0.07);margin-bottom:0;}

      display:flex;align-items:center;gap:16px;
      padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.07);
      cursor:pointer;transition:opacity .18s;
    }
    .list-item:active{opacity:.65;}
    .list-item.hidden-mood{display:none;}
    .list-thumb{width:68px;height:68px;border-radius:16px;flex-shrink:0;}
    .list-body{flex:1;min-width:0;}
    .list-title{font-size:15px;font-weight:700;color:rgba(255,255,255,0.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;line-height:1.3;}

  function loadData(){
    try{const s=localStorage.getItem(STOR_KEY);if(s){const d=JSON.parse(s);if(d.spots&&d.mainPage)return migrate(d);}}catch(e){}
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
  function migrate(d){
    d.hero=d.hero||{};
    if(!d.hero.headingMode) d.hero.headingMode='fixed';
    if(!d.hero.headingTimed) d.hero.headingTimed={defaults:[d.hero.heading||''],slots:[]};
    (d.hero.chips||[]).forEach(c=>{if(c.visible===undefined)c.visible=true;});
    d.spots=(d.spots||[]).map(s=>({...s,
      title:s.title||s.adminTitle||s.location||'',
      thumbTitle1:s.thumbTitle1||s.headline1||'',
      thumbTitle2:s.thumbTitle2||s.headline2||'',
      moodChipIds:s.moodChipIds||[],
      description:s.description||'',
      images:s.images||(s.imageUrl?[{id:'leg_'+s.id,dataUrl:s.imageUrl,name:'image'}]:[]),
      thumbnailImageId:s.thumbnailImageId||(s.imageUrl?'leg_'+s.id:null),
      published:s.published!==undefined?s.published:true,
    }));
    return d;
  }
  function getThumb(spot){
    if(spot.images&&spot.images.length>0){
      const i=spot.images.find(x=>x.id===spot.thumbnailImageId)||spot.images[0];
      return i?i.dataUrl:'';
    }
    return '';
  }

  /* ── 출발지 필터 (admin data에서 동적 로드) ── */
  let loadedRegions = [];

  /* URL 파라미터로 초기 상태 복원 */
  let activeRegion = params.get('region') || null;
  let activeChip   = params.get('mood')   || null;
  let searchQuery  = params.get('q')      || '';

  function renderPage(){
    const data = loadData();
    document.getElementById('brand-name').textContent = data.brandName || '심야 드라이브';
    document.getElementById('page-title').textContent = '아카이브 · ' + (data.brandName || '심야 드라이브');
    loadedRegions = (data.filters && data.filters.regions) || [];

    /* 검색창 초기값 복원 */
    const inp = document.getElementById('search-input');
    if (inp && searchQuery) {
      inp.value = searchQuery;
      document.getElementById('search-clear').classList.add('visible');
    }

    renderRegionDropdown();
    renderChips(data);
    renderList(data);

    /* ?search=1 → 검색창 자동 포커스 후 파라미터 제거 */
    if (params.get('search') === '1') {
      requestAnimationFrame(() => {
        const i = document.getElementById('search-input');
        if (i) i.focus();
        const np = new URLSearchParams(location.search);
        np.delete('search');
        const qs = np.toString();
        history.replaceState(null, '', qs ? '?' + qs : location.pathname);
      });
    }
  }

  function renderRegionDropdown(){
    const dd = document.getElementById('region-dropdown'); if(!dd) return;
    dd.innerHTML = `<button class="region-dropdown-item item-clear" data-region-id="" onclick="selectRegion(null)" type="button">출발지 전체</button>`
      + loadedRegions.map(r =>
          `<button class="region-dropdown-item" data-region-id="${h(r.id)}" onclick="selectRegion('${h(r.id)}')" type="button">${h(r.label)} 출발</button>`
        ).join('');
    updateRegionTitle();
  }

  function updateRegionTitle(){
    const regLabel = document.getElementById('title-region-label');
    if(regLabel){
      if(activeRegion){
        const r = loadedRegions.find(r => r.id === activeRegion);
        regLabel.textContent = (r ? r.label : activeRegion) + ' 출발';
      } else {
        regLabel.textContent = '출발지 전체';
      }
    }
    document.querySelectorAll('.region-dropdown-item').forEach(btn=>{
      const rid = btn.dataset.regionId || null;
      btn.classList.toggle('active', rid === activeRegion);
    });
  }

  function toggleRegionDropdown(){
    const wrap = document.getElementById('title-departure-wrap');
    const dd   = document.getElementById('region-dropdown');
    if(!wrap || !dd) return;
    if(wrap.classList.contains('dropdown-open')){ closeRegionDropdown(); }
    else { wrap.classList.add('dropdown-open'); dd.classList.add('open'); }
  }

  function closeRegionDropdown(){
    const wrap = document.getElementById('title-departure-wrap');
    const dd   = document.getElementById('region-dropdown');
    if(wrap) wrap.classList.remove('dropdown-open');
    if(dd)   dd.classList.remove('open');
  }

  function selectRegion(id){
    activeRegion = id;
    closeRegionDropdown();
    updateRegionTitle();
    syncURL();
    applyFilter();
  }

  function renderChips(data){
    const chips = (data.hero.chips||[]).filter(c=>c.visible!==false);
    const el = document.getElementById('chip-filter');
    el.innerHTML = chips.map(c => `
      <button class="glass-chip${activeChip===c.id?' active':''}"
        data-chip-id="${h(c.id)}"
        onclick="toggleChip('${h(c.id)}')"
        type="button">
        ${ICONS[c.icon]||ICON_FB}
        <span>${h(c.label)}</span>
      </button>`).join('');
  }

  function renderList(data){
    const el = document.getElementById('spot-list');
    const spots = (data.spots||[]).filter(s=>s.published!==false);

    if (!spots.length) {
      el.innerHTML = '';
      document.getElementById('no-results').style.display = 'block';
      return;
    }

    el.innerHTML = spots.map(spot => {
      const thumbUrl  = getThumb(spot);
      const presetCls = thumbUrl ? '' : `spot-preset-${spot.bgPreset||'1'}`;
      const thumbBg   = thumbUrl ? `background:url('${h(thumbUrl)}') center/cover no-repeat` : `background-color:${h(spot.bgColor||'#1a2e4a')}`;
      const moodIds   = JSON.stringify(spot.moodChipIds||[]).replace(/"/g,'&quot;');
      const regionIds = JSON.stringify(spot.regionIds||[]).replace(/"/g,'&quot;');
      const searchTxt = [spot.title,spot.location,spot.tags,spot.description||''].join(' ').replace(/"/g,'&quot;');
      return `
        <div class="list-item"
          data-spot-id="${h(spot.id)}"
          data-mood-ids="${moodIds}"
          data-region-ids="${regionIds}"
          data-search-text="${searchTxt}"
          onclick="goToSpot('${h(spot.id)}')">
          <div class="list-thumb ${presetCls}" style="${thumbBg};"></div>
          <div class="list-body">
            <p class="list-title">${h(spot.title||spot.location||'')}</p>
            <p class="list-loc">${h(spot.location)}</p>
            <p class="list-tags">${h(spot.tags)}</p>
          </div>
          <svg class="list-chevron" fill="none" stroke="rgba(255,255,255,0.22)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>`;
    }).join('');

    applyFilter();
  }

  function toggleChip(id){
    /* 단일 선택: 같은 칩 재클릭 → 해제, 다른 칩 클릭 → 교체 */
    activeChip = (activeChip === id) ? null : id;
    syncURL();
    document.querySelectorAll('.glass-chip').forEach(btn=>{
      btn.classList.toggle('active', btn.dataset.chipId === activeChip);
    });
    applyFilter();
  }

  function onSearch(value){
    searchQuery = value.trim();
    document.getElementById('search-clear').classList.toggle('visible', !!searchQuery);
    syncURL();
    applyFilter();
  }

  function clearSearch(){
    searchQuery = '';
    const inp = document.getElementById('search-input');
    if(inp) inp.value = '';
    document.getElementById('search-clear').classList.remove('visible');
    syncURL();
    applyFilter();
  }

  function syncURL(){
    const np = new URLSearchParams(location.search);
    if(activeRegion) np.set('region', activeRegion); else np.delete('region');
    if(activeChip)   np.set('mood',   activeChip);   else np.delete('mood');
    if(searchQuery)  np.set('q',      searchQuery);  else np.delete('q');
    np.delete('search');
    const qs = np.toString();
    history.replaceState(null, '', qs ? '?' + qs : location.pathname);
  }

  function applyFilter(){
    const q = searchQuery.toLowerCase();
    let visible = 0;
    document.querySelectorAll('.list-item').forEach(item=>{
      let show = true;

      /* 출발지 필터 */
      if(activeRegion){
        try{
          const rids=JSON.parse(item.dataset.regionIds||'[]');
          if(!rids.includes(activeRegion)) show=false;
        }catch(e){ show=false; }
      }

      /* 무드 필터 */
      if(show && activeChip){
        try{
          const moods = JSON.parse(item.dataset.moodIds||'[]');
          if(!moods.includes(activeChip)) show = false;
        }catch(e){}
      }

      /* 검색 필터 */
      if(show && q){
        const txt = (item.dataset.searchText||'').toLowerCase();
        if(!txt.includes(q)) show = false;
      }

      item.classList.toggle('hidden-mood', !show);
      if(show) visible++;
    });

    const nr = document.getElementById('no-results');
    const hasFilter = activeRegion || activeChip || searchQuery;
    if(nr){
      nr.querySelector('p').textContent = searchQuery
        ? `"${searchQuery}" 검색 결과가 없습니다.`
        : activeRegion
          ? `해당 출발지의 스팟이 없습니다.`
          : '해당 무드의 스팟이 없습니다.';
      nr.style.display = (visible===0 && hasFilter) ? 'block' : 'none';
    }
  }

  function goToSpot(id){
    window.location.href = 'spot.html?id=' + encodeURIComponent(id) + (IS_PREV?'&preview=draft':'');
  }

  function goHome(){
    window.location.href = 'index.html' + (IS_PREV?'?preview=draft':'');
  }

  document.addEventListener('click', function(e){
    const wrap = document.getElementById('title-departure-wrap');
    if(wrap && !wrap.contains(e.target)) closeRegionDropdown();
  });

  window.addEventListener('storage', e=>{ if(e.key===STOR_KEY) renderPage(); });
  renderPage();
  if(!IS_PREV){
    SB.get().then(remote=>{
      if(!remote)return;
      localStorage.setItem('nightDriveConfig',JSON.stringify(remote));
      renderPage();
    }).catch(()=>{});
  }
  </script>

</body>
</html>
