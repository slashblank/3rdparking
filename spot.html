<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title id="page-title">심야 드라이브</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scrollbar-gutter:stable;}
    body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

    /* ── Presets (identical to index.html) ── */
    .spot-preset-1{background:radial-gradient(ellipse at 65% 25%,#2d1b4e 0%,#090912 55%),linear-gradient(175deg,#0a0818 0%,#1a0f30 55%,#060609 100%);}
    .spot-preset-2{background:radial-gradient(ellipse at 30% 60%,#0a2d40 0%,#030d15 55%),linear-gradient(175deg,#030d12 0%,#0d2535 55%,#030a10 100%);}
    .spot-preset-3{background:radial-gradient(ellipse at 70% 40%,#1a2d0a 0%,#0a0d03 55%),linear-gradient(175deg,#050810 0%,#151f0a 55%,#050808 100%);}
    .spot-preset-4{background:radial-gradient(ellipse at 45% 30%,#1a0a30 0%,#090912 55%),linear-gradient(175deg,#060609 0%,#120a28 55%,#050508 100%);}
    .spot-preset-5{background:radial-gradient(ellipse at 55% 50%,#2d1a0a 0%,#0d0905 55%),linear-gradient(175deg,#0a0503 0%,#1e1005 55%,#090502 100%);}

    /* ── Page wrapper (max-width container) ── */
    .page{max-width:480px;margin:0 auto;position:relative;}

    /* ── Hero — same veil effects as index.html content-veil / header-veil ── */
    .hero{
      position:relative;
      width:100%;height:65dvh;min-height:320px;
      overflow:hidden;
    }
    .content-veil{
      position:absolute;left:0;right:0;bottom:0;height:64%;
      background:linear-gradient(to top,rgba(0,0,0,0.82) 0%,rgba(0,0,0,0.48) 38%,rgba(0,0,0,0.14) 70%,transparent 100%);
      -webkit-backdrop-filter:blur(8px) saturate(120%);backdrop-filter:blur(8px) saturate(120%);
      -webkit-mask-image:linear-gradient(to top,#000 48%,rgba(0,0,0,0.55) 72%,transparent 100%);
      mask-image:linear-gradient(to top,#000 48%,rgba(0,0,0,0.55) 72%,transparent 100%);
      pointer-events:none;
    }
    .header-veil-hero{
      position:absolute;top:0;left:0;right:0;
      background:linear-gradient(to bottom,rgba(0,0,0,0.55),transparent);
      -webkit-backdrop-filter:blur(10px) saturate(120%);backdrop-filter:blur(10px) saturate(120%);
      -webkit-mask-image:linear-gradient(to bottom,#000 50%,transparent 100%);
      mask-image:linear-gradient(to bottom,#000 50%,transparent 100%);
      height:30%;pointer-events:none;
    }

    /* Image swipe carousel */
    .swipe{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;width:100%;height:100%;-ms-overflow-style:none;scrollbar-width:none;}
    .swipe::-webkit-scrollbar{display:none;}
    .swipe-slide{flex-shrink:0;width:100%;height:100%;scroll-snap-align:start;}
    .swipe-slide img{width:100%;height:100%;object-fit:cover;display:block;}

    /* Dots */
    .hero-info{position:absolute;bottom:28px;left:32px;right:32px;z-index:2;}
    .dots{display:flex;gap:5px;margin-bottom:12px;}
    .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.28);transition:background .2s;}
    .dot.on{background:rgba(255,255,255,0.92);}

    /* Hero text — same as index.html buildSpotSection */
    .hero-tags{font-size:13px;font-weight:700;color:rgba(251,191,36,0.85);letter-spacing:.02em;margin-bottom:9px;}
    .hero-title{font-size:28px;font-weight:900;line-height:1.2;letter-spacing:-.025em;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,0.55);margin-bottom:9px;}
    .hero-loc{font-size:15px;font-weight:500;color:rgba(255,255,255,0.80);}

    /* ── Content card — same bg as index.html list section ── */
    .content-card{
      background:#111116;
      border-radius:24px 24px 0 0;
      margin-top:-9px;position:relative;z-index:10;
      padding:34px 32px 120px;
      min-height:45dvh;
    }
    .handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.12);margin:0 auto 24px;}

    /* Mood chips */
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px;}
    .chip{
      display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:50px;
      border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);
      font-size:13px;font-weight:600;color:rgba(255,255,255,0.55);
    }

    /* Description */
    .desc{font-size:15px;line-height:1.85;color:rgba(255,255,255,0.55);white-space:pre-wrap;}

    /* Divider */
    .divider{height:1px;background:rgba(255,255,255,0.07);margin:22px 0;}

    /* Image gallery */
    .gallery-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.22);margin-bottom:12px;}
    .gallery{display:flex;gap:10px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;padding-bottom:4px;}
    .gallery::-webkit-scrollbar{display:none;}
    .gallery-item{flex-shrink:0;width:148px;height:148px;border-radius:14px;overflow:hidden;cursor:pointer;}
    .gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .22s;}
    .gallery-item:active img{transform:scale(.96);}

    /* Empty content */
    .no-content{font-size:14px;color:rgba(255,255,255,0.20);font-style:italic;}

    /* Error page */
    .err{padding:80px 32px;text-align:center;}
    .err p{font-size:15px;color:rgba(255,255,255,0.30);line-height:1.7;}
    .err a{color:rgba(74,222,128,0.70);font-weight:700;text-decoration:none;}

    /* Toast */
    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:rgba(74,222,128,0.14);border:1px solid rgba(74,222,128,0.30);
      color:rgba(134,239,172,0.95);padding:9px 22px;border-radius:10px;
      font-size:13px;font-weight:700;z-index:999;transition:opacity .35s;pointer-events:none;
      white-space:nowrap;
    }
  </style>
</head>

    heart:`<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>`,
    eye:`<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`,
    cocktail:`<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.25 3h7.5l-3.75 7.5H12m0 7.5V10.5m0 7.5h3.75m-7.5 0H12"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5.25 3l1.5 7.5"/></svg>`,
    bicycle:`<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.5 17.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.5 17.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.5 14L10 7h4l4 7"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 7l3 5.5M15.5 7h2.5"/></svg>`,
    anchor:`<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 7a2.5 2.5 0 100-5 2.5 2.5 0 000 5zm0 0v14M5 12c.7 4.1 3.5 6 7 6s6.3-1.9 7-6"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 12h2.5m11 0H20"/></svg>`,
    cloud:`<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 004 15z"/></svg>`,
    bolt:`<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>`,
    sparkle:`<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>`,
    tent:`<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3L4 20h16L12 3z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.5 20L12 10.5l2.5 9.5"/></svg>`,
    wind:`<svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8h11.5a3.5 3.5 0 100-7H12"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12h15.5a3.5 3.5 0 110 7H16"/></svg>`,
  };
  const ICON_FB = ICONS.star;

  function h(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function loadData(){
    try{const s=localStorage.getItem(STOR_KEY);if(s){const d=JSON.parse(s);if(d.spots&&d.mainPage)return migrate(d);}}catch(e){}
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
  function migrate(d){
    d.hero=d.hero||{};
    if(!d.hero.headingMode) d.hero.headingMode='fixed';
    if(!d.hero.headingTimed) d.hero.headingTimed={defaults:[d.hero.heading||''],slots:[]};
    (d.hero.chips||[]).forEach(c=>{if(c.visible===undefined)c.visible=true;});
    d.spots=(d.spots||[]).map(s=>({...s,
      title:s.title||s.adminTitle||s.location||'',
      thumbTitle1:s.thumbTitle1||s.headline1||'',
      thumbTitle2:s.thumbTitle2||s.headline2||'',
      moodChipIds:s.moodChipIds||[],
      description:s.description||'',
      images:s.images||(s.imageUrl?[{id:'leg_'+s.id,dataUrl:s.imageUrl,name:'image'}]:[]),
      thumbnailImageId:s.thumbnailImageId||(s.imageUrl?'leg_'+s.id:null),
      published:s.published!==undefined?s.published:true,
    }));
    return d;
  }
  function getThumb(spot){
    if(spot.images&&spot.images.length>0){
      const i=spot.images.find(x=>x.id===spot.thumbnailImageId)||spot.images[0];
      return i?i.dataUrl:'';
    }
    return '';
  }

  let _spot = null;

  function render(){
    const data = loadData();
    document.getElementById('brand-name').textContent = data.brandName || '심야 드라이브';

    if(!SPOT_ID){ showErr('URL에 스팟 ID가 없습니다.'); return; }
    const spot = data.spots.find(s=>s.id===SPOT_ID);
    if(!spot){ showErr('스팟을 찾을 수 없습니다.'); return; }
    _spot = spot;

    document.getElementById('page-title').textContent =
      (spot.title||spot.location||'스팟') + ' · ' + (data.brandName||'심야 드라이브');

    const images = spot.images || [];
    const thumbUrl = getThumb(spot);
    const presetCls = (thumbUrl||images.length) ? '' : `spot-preset-${spot.bgPreset||'1'}`;

    /* ── Hero HTML ── */
    let heroInner = '';
    if(images.length > 0){
      heroInner = `<div class="swipe" id="hero-swipe">
        ${images.map(img=>`<div class="swipe-slide"><img src="${img.dataUrl}" alt="" loading="lazy"></div>`).join('')}
      </div>`;
    }

    const dotsHtml = images.length > 1
      ? `<div class="dots" id="hero-dots">${images.map((_,i)=>`<div class="dot${i===0?' on':''}"></div>`).join('')}</div>`
      : '';

    const heroStyle = (!images.length && spot.bgColor && !presetCls)
      ? ` style="background-color:${h(spot.bgColor)}"`
      : '';

    const t1 = h(spot.thumbTitle1||'');
    const t2 = h(spot.thumbTitle2||spot.title||'');

    const heroHtml = `
      <div class="hero ${presetCls}"${heroStyle}>
        ${heroInner}
        <div class="header-veil-hero"></div>
        <div class="content-veil"></div>
        <div class="hero-info">
          ${dotsHtml}
          ${spot.tags?`<p class="hero-tags">${h(spot.tags)}</p>`:''}
          <h1 class="hero-title">${t1?`${t1}<br>`:''}${t2}</h1>
          <p class="hero-loc">${h(spot.location)}</p>
        </div>
      </div>`;

    /* ── Mood chips ── */
    const moodHtml = (spot.moodChipIds||[]).map(id=>{
      const c=(data.hero.chips||[]).find(x=>x.id===id);
      return c?`<span class="chip">${ICONS[c.icon]||ICON_FB}${h(c.label)}</span>`:'';
    }).join('');

    /* ── Gallery ── */
    const galleryHtml = images.length > 1 ? `
      <div class="divider"></div>
      <p class="gallery-lbl">사진 ${images.length}장</p>
      <div class="gallery">
        ${images.map(img=>`<div class="gallery-item"><img src="${img.dataUrl}" alt="" loading="lazy"></div>`).join('')}
      </div>` : '';

    /* ── Card ── */
    const hasContent = moodHtml || spot.description || galleryHtml;
    const cardHtml = `
      <div class="content-card">
        <div class="handle"></div>
        ${moodHtml?`<div class="chips">${moodHtml}</div>`:''}
        ${spot.description?`<p class="desc">${h(spot.description)}</p>`:''}
        ${galleryHtml}
        ${!hasContent?`<p class="no-content">아직 상세 내용이 없습니다.</p>`:''}
      </div>`;

    document.getElementById('app').innerHTML = heroHtml + cardHtml;

    /* ── Swipe dots sync ── */
    if(images.length > 1){
      const sw = document.getElementById('hero-swipe');
      if(sw) sw.addEventListener('scroll',()=>{
        const idx = Math.round(sw.scrollLeft/sw.clientWidth);
        document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===idx));
      },{passive:true});
    }
  }

  function showErr(msg){
    document.getElementById('app').innerHTML = `
      <div class="err">
        <p>${msg}<br><br>
        <a href="index.html${IS_PREV?'?preview=draft':''}">← 홈으로 돌아가기</a></p>
      </div>`;
  }

  function goBack(){
    if(history.length>1) history.back();
    else window.location.href='index.html'+(IS_PREV?'?preview=draft':'');
  }

  function toggleLike(){ document.getElementById('like-btn').classList.toggle('liked'); }

  function shareSpot(){
    const title = _spot ? (_spot.title||_spot.location||'심야 드라이브') : '심야 드라이브';
    if(navigator.share){ navigator.share({title, url:location.href}); }
    else if(navigator.clipboard){
      navigator.clipboard.writeText(location.href);
      toast('링크가 복사됐습니다.');
    }
  }

  function toast(msg){
    const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),380);},2000);
  }

  render();
  if(!IS_PREV){
    SB.get().then(remote=>{
      if(!remote)return;
      localStorage.setItem('nightDriveConfig',JSON.stringify(remote));
      render();
    }).catch(()=>{});
  }
  </script>

</body>
