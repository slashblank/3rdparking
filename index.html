      eye:        `<svg class="w-[18px] h-[18px] text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`,
      cocktail:   `<svg class="w-[18px] h-[18px] text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.25 3h7.5l-3.75 7.5H12m0 7.5V10.5m0 7.5h3.75m-7.5 0H12"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5.25 3l1.5 7.5"/></svg>`,
      bicycle:    `<svg class="w-[18px] h-[18px] text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.5 17.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.5 17.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6.5 14L10 7h4l4 7"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 7l3 5.5M15.5 7h2.5"/></svg>`,
      anchor:     `<svg class="w-[18px] h-[18px] text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 7a2.5 2.5 0 100-5 2.5 2.5 0 000 5zm0 0v14M5 12c.7 4.1 3.5 6 7 6s6.3-1.9 7-6"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 12h2.5m11 0H20"/></svg>`,
      cloud:      `<svg class="w-[18px] h-[18px] text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 004 15z"/></svg>`,
      bolt:       `<svg class="w-[18px] h-[18px] text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>`,
      sparkle:    `<svg class="w-[18px] h-[18px] text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>`,
      tent:       `<svg class="w-[18px] h-[18px] text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3L4 20h16L12 3z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.5 20L12 10.5l2.5 9.5"/></svg>`,
      wind:       `<svg class="w-[18px] h-[18px] text-white/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8h11.5a3.5 3.5 0 100-7H12"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12h15.5a3.5 3.5 0 110 7H16"/></svg>`,
    };

    function h(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function loadData() {
      try {
        const s = localStorage.getItem(STORAGE_KEY);
        if (s) { const d = JSON.parse(s); if (d.spots && d.mainPage) return migrateData(d); }
      } catch(e) {}
      return JSON.parse(JSON.stringify(DEFAULT_DATA));
    }

    function migrateData(d) {
      d.hero = d.hero || {};
      if (!d.hero.headingMode) d.hero.headingMode = 'fixed';
      if (!d.hero.headingTimed) d.hero.headingTimed = { defaults: [d.hero.heading||''], slots: [] };
      (d.hero.chips||[]).forEach(c => { if (c.visible === undefined) c.visible = true; });
      d.spots = (d.spots || []).map(spot => ({
        ...spot,
        title:        spot.title        || spot.adminTitle  || spot.location || '',
        thumbTitle1:  spot.thumbTitle1  || spot.headline1   || '',
        thumbTitle2:  spot.thumbTitle2  || spot.headline2   || '',
        moodChipIds:  spot.moodChipIds  || [],
        description:  spot.description  || '',
        images:       spot.images       || (spot.imageUrl ? [{ id:'legacy_'+spot.id, dataUrl:spot.imageUrl, name:'image' }] : []),
        thumbnailImageId: spot.thumbnailImageId || (spot.imageUrl ? 'legacy_'+spot.id : null),
        published:    spot.published !== undefined ? spot.published : true,
      }));
      return d;
    }

    function resolveHeading(hero) {
      if ((hero.headingMode || 'fixed') === 'fixed') return hero.heading || '';
      const td = hero.headingTimed || {};
      const hour = new Date().getHours();
      const slot = (td.slots || []).find(s => (s.hours || []).includes(hour));
      if (slot && slot.text) return slot.text;
      const defs = (td.defaults || []).filter(t => t && t.trim());
      if (!defs.length) return hero.heading || '';
      return defs[Math.floor(Math.random() * defs.length)];
    }

    // Get thumbnail URL for a spot
    function getThumbUrl(spot) {
      if (spot.images && spot.images.length > 0) {
        const img = spot.images.find(i => i.id === spot.thumbnailImageId) || spot.images[0];
        return img ? img.dataUrl : '';
      }
      return '';
    }

    function buildHeroSection(data) {
      const chips = (data.hero.chips||[]).filter(c=>c.visible!==false).map(c => `
        <button class="glass-chip flex items-center gap-1.5 px-4 py-2.5 rounded-full group" data-chip-id="${h(c.id)}" onclick="toggleMood(this)">
          ${ICONS[c.icon] || ICONS.star}
          <span class="text-[14px] font-medium text-white/80 tracking-tight transition-colors">${h(c.label)}</span>
        </button>`).join('');
      const hint = h(data.hero.scrollHint || '');
      const hintHtml = hint.replace('오늘의 추천 스팟', '<span class="hl-green text-white/90 font-semibold">오늘의 추천 스팟</span>');
      return `
        <section class="relative w-full h-[100dvh] snap-start snap-always overflow-hidden">
          <div class="absolute inset-0 hero-bg"></div>
          <div class="absolute inset-0 hero-stars opacity-30"></div>
          <div class="absolute inset-0 bg-gradient-to-b from-black/10 via-transparent to-black/50 pointer-events-none"></div>
          <div class="absolute inset-x-0 bottom-32 z-10 flex flex-col px-8">
            <div class="glass w-full p-6 rounded-[28px]">
              <h2 class="text-white/80 text-[15px] font-bold tracking-tight mb-4 px-1">${h(resolveHeading(data.hero))}</h2>
              <div class="flex flex-wrap gap-2.5">${chips}</div>
            </div>
            <div class="mt-5 flex flex-col items-center gap-2">
              <p class="text-white/70 text-[13px] font-medium tracking-tight text-center">${hintHtml}</p>
              <svg class="scroll-hint w-5 h-5 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </div>
          </div>
        </section>`;
    }

    function buildSpotSection(spot, idx) {
      const preset = spot.bgPreset || String((idx % 5) + 1);
      const thumbUrl = getThumbUrl(spot);
      return `
        <section class="relative w-full h-[100dvh] snap-start snap-always overflow-hidden ${thumbUrl ? '' : 'spot-preset-' + preset}"
          ${thumbUrl ? `style="background:url('${h(thumbUrl)}') center/cover no-repeat"` : ''}>
          <div class="content-veil"></div>
          <div class="absolute inset-x-0 bottom-32 px-8 text-left z-10 cursor-pointer" style="padding-right:5.5rem;" onclick="goToSpot('${h(spot.id)}')">
            <p class="text-amber-300 text-[13px] font-bold tracking-wide mb-2 drop-shadow-md">${h(spot.tags)}</p>
            <h3 class="font-extrabold text-[28px] leading-[1.2] text-white tracking-tight mb-2 drop-shadow-lg">
              ${h(spot.thumbTitle1)}<br>${h(spot.thumbTitle2)}
            </h3>
            <p class="text-[15px] text-white/85 font-medium drop-shadow">${h(spot.location)}</p>
            <p style="font-size:11.5px;color:rgba(255,255,255,0.36);margin-top:10px;font-weight:600;letter-spacing:.02em;">자세히 보기 →</p>
          </div>
          <div class="absolute right-8 bottom-32 flex flex-col gap-4 z-20">
            <button class="glass-circle w-11 h-11 rounded-full flex items-center justify-center text-white" onclick="toggleLike(this)">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
            </button>
            <button class="glass-circle w-11 h-11 rounded-full flex items-center justify-center text-white" onclick="shareSpot(this,'${h(spot.location)}')">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
            </button>
          </div>
        </section>`;
    }

    function buildListSection(data) {
      const items = (data.mainPage.listItemIds || []).map(id => {
        const spot = data.spots.find(s => s.id === id && s.published !== false);
        if (!spot) return '';
        const thumbUrl = getThumbUrl(spot);
        const presetCls = thumbUrl ? '' : `spot-preset-${spot.bgPreset||'1'}`;
        const thumbBg = thumbUrl
          ? `background:url('${h(thumbUrl)}') center/cover no-repeat`
          : `background-color:${h(spot.bgColor || '#1a2e4a')}`;
        const moodIds = JSON.stringify(spot.moodChipIds || []).replace(/"/g,'&quot;');
        return `
          <div class="list-item" data-mood-ids="${moodIds}" onclick="goToSpot('${h(spot.id)}')"
            style="display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.07);cursor:pointer;transition:opacity .18s;">
            <div class="${presetCls}" style="width:68px;height:68px;border-radius:16px;flex-shrink:0;${thumbBg};"></div>
            <div style="flex:1;min-width:0;">
              <p style="font-size:15px;font-weight:700;color:rgba(255,255,255,0.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0 0 4px;line-height:1.3;">${h(spot.title||spot.location||'')}</p>
              <p style="font-size:12px;font-weight:500;color:rgba(255,255,255,0.32);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0 0 2px;">${h(spot.location)}</p>
              <p style="font-size:11.5px;font-weight:500;color:rgba(255,255,255,0.20);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;">${h(spot.tags)}</p>
            </div>
            <svg style="width:18px;height:18px;flex-shrink:0;" fill="none" stroke="rgba(255,255,255,0.22)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </div>`;
      }).join('');

      return `
        <section id="list-section" style="position:relative;width:100%;min-height:100dvh;background:#111116;display:flex;flex-direction:column;scroll-snap-align:start;scroll-snap-stop:always;">
          <div style="padding:96px 32px 16px;flex-shrink:0;">
            <h2 style="font-size:24px;font-weight:900;color:rgba(255,255,255,0.90);letter-spacing:-.02em;line-height:1.25;margin:0;">${h(data.mainPage.listTitle || '이런 곳은 어때요?')}</h2>
          </div>
          <div style="padding:0 32px 120px;flex:1;">
            <div id="list-items-container" style="border-top:1px solid rgba(255,255,255,0.07);">${items}</div>
            <div id="no-results" class="hidden" style="padding:48px 0;text-align:center;">
              <p style="font-size:14px;color:rgba(255,255,255,0.28);font-weight:500;">해당 무드의 스팟이 없습니다.</p>
            </div>
          </div>
        </section>`;
    }

    function renderPage() {
      const data = loadData();
      document.getElementById('brand-name').textContent = data.brandName || '심야 드라이브';
      document.getElementById('page-title').textContent = data.brandName || '심야 드라이브';
      let html = buildHeroSection(data);
      (data.mainPage.contentSpotIds || []).forEach((id, i) => {
        const spot = data.spots.find(s => s.id === id && s.published !== false);
        if (spot) html += buildSpotSection(spot, i);
      });
      html += buildListSection(data);
      document.getElementById('main-container').innerHTML = html;
    }

    function toggleMood(btn) {
      const id = btn.dataset.chipId;
      if (!id) return;
      const preview = new URLSearchParams(location.search).get('preview');
      const qs = '?mood=' + encodeURIComponent(id) + (preview ? '&preview=' + preview : '');
      window.location.href = 'contents_spot.html' + qs;
    }

    function goToSpot(id) {
      const preview = new URLSearchParams(location.search).get('preview');
      window.location.href = 'spot.html?id=' + encodeURIComponent(id) + (preview ? '&preview=' + preview : '');
    }
    function goToArchive() {
      const preview = new URLSearchParams(location.search).get('preview');
      window.location.href = 'contents_spot.html' + (preview ? '?preview=' + preview : '');
    }

    function toggleLike(btn) { btn.classList.toggle('liked'); }
    function shareSpot(btn, location) {
      if (navigator.share) { navigator.share({ title: document.getElementById('brand-name').textContent, text: location, url: window.location.href }); }
      else if (navigator.clipboard) {
        navigator.clipboard.writeText(window.location.href);
        btn.style.background = 'rgba(74,222,128,0.15)';
        setTimeout(() => { btn.style.background = ''; }, 1200);
      }
    }
    function scrollToSection(idx) { const s = document.querySelectorAll('#main-container section'); if (s[idx]) s[idx].scrollIntoView({ behavior:'smooth' }); }
    function scrollToLast() { const s = document.querySelectorAll('#main-container section'); if (s.length) s[s.length-1].scrollIntoView({ behavior:'smooth' }); }

    window.addEventListener('storage', e => { if (e.key === STORAGE_KEY) renderPage(); });
    renderPage();
    if (STORAGE_KEY === 'nightDriveConfig') {
      SB.get().then(remote => {
        if (!remote) return;
        localStorage.setItem('nightDriveConfig', JSON.stringify(remote));
        renderPage();
      }).catch(() => {});
    }
  </script>

</body>
</html>
